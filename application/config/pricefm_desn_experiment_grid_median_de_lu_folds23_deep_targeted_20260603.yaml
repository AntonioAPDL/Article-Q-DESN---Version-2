pricefm_desn_experiment_grid:
  grid_id: pricefm_median_de_lu_folds23_deep_targeted_20260603
  purpose: >
    Deep targeted median-selection grid for DE_LU folds 2 and 3 after the first
    registry-promoted paper-quantile comparison showed that Q-DESN exAL RHS_NS
    beats naive baselines but trails local PriceFM Phase-I on folds 2 and 3.
    This grid searches the promising reservoir neighborhoods more thoroughly
    while preserving validation-only selection. Test metrics are audit-only.

  base:
    data_config: application/config/pricefm_data_pipeline.yaml
    full_config: application/config/pricefm_desn_model_median_de_lu_fold1_authoritative_reservoir_corrected_20260602.yaml
    generated_root: application/data_local/pricefm/experiment_grids/pricefm_median_de_lu_folds23_deep_targeted_20260603
    run_root: application/data_local/pricefm/runs/pricefm_median_de_lu_folds23_deep_targeted_20260603

  scope:
    regions: [DE_LU]
    folds: [2, 3]
    quantiles: [0.50]
    horizons: all
    ranking_split: val
    audit_split: test
    ranking_unit: original
    ranking_metric: AQL

  fixed:
    lead_window: 96
    feature_map: window_reservoir_v1
    include_intercept: true
    shrink_intercept: false
    train_origin_limit: 3000
    train_origin_selection: tail
    row_chunk_size: 512
    projection_scale: 1.0
    recurrent_sparsity: 0.05
    reservoir_activation: tanh
    state_output: final_layer
    default_jobs: 1
    qdesn_likelihoods: [al, exal]
    warm_start_enabled: true
    exact_equivalence_train_rows: 1000
    artifact_hygiene:
      enabled: true
      clean_adapter_patterns: [X_*.csv]
      clean_model_patterns: ["*.rds", "*.rda", "*.RData"]
      preserve_patterns:
        - adapter_manifest.json
        - feature_manifest.json
        - rows_*.csv
        - rows_all.csv
        - y_*.csv
        - metric_summary.csv
        - metric_by_horizon.csv
        - metric_by_horizon_group.csv
        - model_method_summary.csv
        - model_parameter_summary.csv
        - model_trace_summary.csv
        - predictions_with_naive_scaled.csv
        - model_predictions_scaled.csv
        - exact_equivalence.csv
        - warm_start_diagnostics.csv
        - report.md
        - "*.png"
        - "*.pdf"
        - "*.json"
        - "*.log"

  launch:
    smoke:
      priorities: [0]
      experiment_jobs: 4
      cell_jobs: 1
      build_windows: true
      note: >
        Small gate containing anchors and a few new fold-2/fold-3 neighborhoods.
        It verifies config generation, window scope, reservoir manifests, exact
        chunking, and artifact hygiene before the broader priority-1 run.
    overnight_targeted:
      priorities: [1]
      experiment_jobs: 10
      cell_jobs: 1
      build_windows: true
      note: >
        Main targeted search. Expected to be substantially larger than the
        first fold-2/3 screen but still bounded by median-only quantile,
        single-region scope, exact chunking, one core per cell, and artifact
        hygiene.
    diagnostics:
      priorities: [2]
      experiment_jobs: 4
      cell_jobs: 1
      build_windows: true
      note: >
        Optional diagnostics only. Do not launch before inspecting priority-1.

  experiments:
    - id: rfdeep_p0_anchor_f2_l072_n120_a0p50_r0p90_in0p50_seed20260603
      stage: fold2_anchor
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 72
      depth: 1
      units: [120]
      alpha: 0.50
      rho: 0.90
      input_scale: 0.50
      tau0: 1.0e-3
      seed: 20260603
      rationale: Fold-2 validation-selected neighborhood, rerun with current deep-grid seed.

    - id: rfdeep_p0_anchor_f3_l096_n080_a0p50_r0p90_in0p50_seed20260603
      stage: fold3_anchor
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 96
      depth: 1
      units: [80]
      alpha: 0.50
      rho: 0.90
      input_scale: 0.50
      tau0: 1.0e-3
      seed: 20260603
      rationale: Fold-3 validation-selected neighborhood, rerun with current deep-grid seed.

    - id: rfdeep_p0_f2audit_l096_n080_a0p50_r0p90_in0p50_seed20260603
      stage: fold2_test_audit_neighbor
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 96
      depth: 1
      units: [80]
      alpha: 0.50
      rho: 0.90
      input_scale: 0.50
      tau0: 1.0e-3
      seed: 20260603
      rationale: Fold-2 test-audit winner from the first screen; audit-only evidence motivates a validation rerun.

    - id: rfdeep_p0_short_l048_n080_a0p50_r0p90_in0p50_seed20260603
      stage: short_horizon_repair
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 48
      depth: 1
      units: [80]
      alpha: 0.50
      rho: 0.90
      input_scale: 0.50
      tau0: 1.0e-3
      seed: 20260603
      rationale: Shorter context diagnostic because fold-3 gaps are concentrated at horizons 1-24.

    - id: rfdeep_p0_lowinput_l096_n080_a0p50_r0p90_in0p25_seed20260603
      stage: input_scale_repair
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 96
      depth: 1
      units: [80]
      alpha: 0.50
      rho: 0.90
      input_scale: 0.25
      tau0: 1.0e-3
      seed: 20260603
      rationale: Lower input scale near fold-3 anchor to reduce possible reservoir saturation.

    - id: rfdeep_p0_d2_l096_n080x080_a0p50_r0p90_in0p50_seed20260603
      stage: compact_d2_recheck
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 96
      depth: 2
      units: [80, 80]
      alpha: 0.50
      rho: 0.90
      input_scale: 0.50
      tau0: 1.0e-3
      seed: 20260603
      rationale: Compact D2 was the closest competitor for fold 3; rerun with current seed.

  experiment_blocks:
    - id_prefix: rfdeep_p1_d1core
      stage: d1_core_surface
      priority: 1
      rationale: >
        Main D1 reservoir surface around the fold-2 n=120 and fold-3 n=80
        neighborhoods. Keeps input_scale fixed at 0.50 and searches context,
        capacity, alpha, and rho.
      base:
        feature_map: window_reservoir_v1
        depth: 1
        input_scale: 0.50
        tau0: 1.0e-3
        seed: 20260603
      factors:
        lag_window: [72, 96]
        units: [[60], [80], [100], [120], [160]]
        alpha: [0.40, 0.50, 0.60]
        rho: [0.85, 0.90, 0.97]

    - id_prefix: rfdeep_p1_input
      stage: input_scale_surface
      priority: 1
      rationale: >
        Input-scale surface around n=80/n=120. The first screen suggested
        lower input scale can improve some fold-2 audit metrics, while fold 3
        needs better short-horizon behavior.
      base:
        feature_map: window_reservoir_v1
        depth: 1
        alpha: 0.50
        tau0: 1.0e-3
        seed: 20260603
      factors:
        lag_window: [72, 96]
        units: [[80], [120]]
        rho: [0.85, 0.90, 0.97]
        input_scale: [0.25, 0.35, 0.50, 0.75]

    - id_prefix: rfdeep_p1_context
      stage: context_tail_surface
      priority: 1
      rationale: >
        Context tail around the fold-2 and fold-3 anchors. Includes 48 for
        short-horizon repair and 128/144 for slight longer-memory checks.
      base:
        feature_map: window_reservoir_v1
        depth: 1
        alpha: 0.50
        rho: 0.90
        input_scale: 0.50
        tau0: 1.0e-3
        seed: 20260603
      factors:
        lag_window: [48, 128, 144]
        units: [[80], [120]]

    - id_prefix: rfdeep_p1_d2compact
      stage: compact_d2_surface
      priority: 1
      rationale: >
        Compact D2 alternatives. D2 was not the first-screen winner but was
        close enough on fold 3 to justify a bounded check.
      base:
        feature_map: window_reservoir_v1
        depth: 2
        alpha: 0.50
        rho: 0.90
        input_scale: 0.50
        tau0: 1.0e-3
        seed: 20260603
      factors:
        lag_window: [72, 96]
        units: [[40, 40], [60, 60], [80, 80]]

    - id_prefix: rfdeep_p1_tau0
      stage: tau0_anchor_check
      priority: 1
      rationale: >
        Small RHS_NS tau0 sensitivity check on the two anchor geometries. Prior
        evidence says tau0 is usually not the bottleneck, so this remains small.
      base:
        feature_map: window_reservoir_v1
        depth: 1
        alpha: 0.50
        rho: 0.90
        input_scale: 0.50
        seed: 20260603
      factors:
        lag_window: [72, 96]
        units: [[80], [120]]
        tau0: [1.0e-4, 1.0e-2]

    - id_prefix: rfdeep_p1_seed
      stage: seed_robustness
      priority: 1
      rationale: >
        Seed robustness for the two most important anchor neighborhoods. These
        are not selected independently unless validation metrics justify them.
      base:
        feature_map: window_reservoir_v1
        depth: 1
        alpha: 0.50
        rho: 0.90
        input_scale: 0.50
        tau0: 1.0e-3
      factors:
        lag_window: [72, 96]
        units: [[80], [120]]
        seed: [20260604]

    - id_prefix: rfdeep_p2_windowdesn
      stage: optional_window_desn_projection
      priority: 2
      rationale: >
        Optional random-projection DESN diagnostics. These are excluded from the
        main overnight launch unless the reservoir grid remains weak.
      base:
        feature_map: window_desn_v1
        tau0: 1.0e-3
        seed: 20260603
      factors:
        lag_window: [72, 96]
        feature_dim: [240, 360, 480]
        projection_scale: [0.35, 0.50, 0.75]

    - id_prefix: rfdeep_p2_flat
      stage: optional_flat_direct_diagnostic
      priority: 2
      rationale: >
        Direct raw-window upper-bound diagnostics. These can be expensive and
        are not part of the main relaunch.
      base:
        feature_map: flat_direct
        feature_dim: 0
        tau0: 1.0e-3
        seed: 20260603
      factors:
        lag_window: [48, 72, 96]
