      input_scale: 0.5
      tau0: 1.0e-3
      seed: 20260601
      quantile: 0.25
      rationale: Corrected fold-1 median winner geometry, tau=0.25 fold-robustness cell.

    - id: pq_tau0p45_rc_p1_d1n120_l096_alpha0p5_rho0p9_input_scale0p5
