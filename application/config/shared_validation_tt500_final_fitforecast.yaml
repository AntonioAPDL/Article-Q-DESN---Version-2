article_policy: >-
  Final article-facing 500-observation fit-and-forecast comparison. Q-DESN
  exAL RHS MCMC rows are replaced by the June 30, 2026 diagnostic-qualified
  authoritative handoff. Q-DESN AL RHS MCMC rows are replaced by the July 2,
  2026 recalibrated diagnostic-qualified handoff with PASS/WARN flags
  preserved. Q-DESN AL/exAL ridge VB and MCMC rows are replaced by the July 1,
  2026 corrected ridge handoff with diagnostic flags preserved, including
  accepted WARN/FAIL rows where explicitly pinned. exDQLM/DQLM VB rows are
  replaced by the July 3, 2026 current-best c13 summary override; exDQLM/DQLM
  MCMC rows remain historical until a matched MCMC refresh is pinned. These
  handoffs exclude 5000-observation MCMC; 5000-observation rows remain outside
  manuscript claims unless a later config pins complete interfaces with their
  own hashes and guards.
