pricefm_desn_experiment_grid:
  grid_id: pricefm_median_de_lu_folds23_selection_20260602
  purpose: >
    Region-fold median-selection grid for DE_LU folds 2 and 3. The goal is to
    select fold-specific DESN/Q-DESN reservoir specifications on validation
    median performance, then promote the selected specifications to the
    PriceFM paper-quantile grid. Test metrics are audit-only and must not drive
    selection.

  base:
    data_config: application/config/pricefm_data_pipeline.yaml
    full_config: application/config/pricefm_desn_model_median_de_lu_fold1_authoritative_reservoir_corrected_20260602.yaml
    generated_root: application/data_local/pricefm/experiment_grids/pricefm_median_de_lu_folds23_selection_20260602
    run_root: application/data_local/pricefm/runs/pricefm_median_de_lu_folds23_selection_20260602

  scope:
    regions: [DE_LU]
    folds: [2, 3]
    quantiles: [0.50]
    horizons: all
    ranking_split: val
    audit_split: test
    ranking_unit: original
    ranking_metric: AQL

  fixed:
    lead_window: 96
    feature_map: window_reservoir_v1
    include_intercept: true
    shrink_intercept: false
    train_origin_limit: 3000
    train_origin_selection: tail
    row_chunk_size: 512
    projection_scale: 1.0
    recurrent_sparsity: 0.05
    reservoir_activation: tanh
    state_output: final_layer
    default_jobs: 1
    qdesn_likelihoods: [al, exal]
    warm_start_enabled: true
    exact_equivalence_train_rows: 1000
    artifact_hygiene:
      enabled: true
      clean_adapter_patterns: [X_*.csv]
      clean_model_patterns: ["*.rds", "*.rda", "*.RData"]
      preserve_patterns:
        - adapter_manifest.json
        - feature_manifest.json
        - rows_*.csv
        - rows_all.csv
        - y_*.csv
        - metric_summary.csv
        - metric_by_horizon.csv
        - metric_by_horizon_group.csv
        - model_method_summary.csv
        - model_parameter_summary.csv
        - model_trace_summary.csv
        - predictions_with_naive_scaled.csv
        - model_predictions_scaled.csv
        - exact_equivalence.csv
        - warm_start_diagnostics.csv
        - report.md
        - "*.png"
        - "*.pdf"
        - "*.json"
        - "*.log"

  launch:
    focused_screen:
      priorities: [0]
      experiment_jobs: 6
      cell_jobs: 1
      build_windows: true
      note: >
        First fold-specific median selection screen. It is intentionally
        compact: run all priority-0 experiments on folds 2 and 3, select by
        validation original-unit AQL, and only then decide whether priority-1
        expansion is warranted.
    optional_expansion:
      priorities: [1]
      experiment_jobs: 6
      cell_jobs: 1
      build_windows: true
      note: >
        Optional broader expansion around the selected fold-specific region.
        Do not launch before inspecting the priority-0 registry.

  experiments:
    - id: rf_p0_f23_d1n120_l096_a0p50_r0p90_in0p50_seed20260601
      stage: fold1_selected_reference
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 96
      depth: 1
      units: [120]
      alpha: 0.50
      rho: 0.90
      input_scale: 0.50
      tau0: 1.0e-3
      seed: 20260601
      rationale: Corrected fold-1 selected geometry.

    - id: rf_p0_f23_d1n120_l096_a0p50_r0p80_in0p50_seed20260601
      stage: rho_neighbor
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 96
      depth: 1
      units: [120]
      alpha: 0.50
      rho: 0.80
      input_scale: 0.50
      tau0: 1.0e-3
      seed: 20260601
      rationale: Lower-rho neighbor from the fold-1 top set.

    - id: rf_p0_f23_d1n120_l096_a0p50_r0p97_in0p50_seed20260601
      stage: rho_neighbor
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 96
      depth: 1
      units: [120]
      alpha: 0.50
      rho: 0.97
      input_scale: 0.50
      tau0: 1.0e-3
      seed: 20260601
      rationale: Higher-rho neighbor from the fold-1 top set.

    - id: rf_p0_f23_d1n080_l096_a0p70_r0p97_in0p25_seed20260601
      stage: fold1_top_neighbor
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 96
      depth: 1
      units: [80]
      alpha: 0.70
      rho: 0.97
      input_scale: 0.25
      tau0: 1.0e-3
      seed: 20260601
      rationale: Fold-1 top-4 corrected-grid neighbor with lower input scale.

    - id: rf_p0_f23_d1n080_l096_a0p50_r0p90_in0p50_seed20260601
      stage: capacity_neighbor
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 96
      depth: 1
      units: [80]
      alpha: 0.50
      rho: 0.90
      input_scale: 0.50
      tau0: 1.0e-3
      seed: 20260601
      rationale: Lower-capacity version of the fold-1 selected dynamics.

    - id: rf_p0_f23_d1n180_l096_a0p50_r0p90_in0p50_seed20260601
      stage: capacity_neighbor
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 96
      depth: 1
      units: [180]
      alpha: 0.50
      rho: 0.90
      input_scale: 0.50
      tau0: 1.0e-3
      seed: 20260601
      rationale: Higher-capacity version of the fold-1 selected dynamics.

    - id: rf_p0_f23_d1n120_l072_a0p50_r0p90_in0p50_seed20260601
      stage: context_neighbor
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 72
      depth: 1
      units: [120]
      alpha: 0.50
      rho: 0.90
      input_scale: 0.50
      tau0: 1.0e-3
      seed: 20260601
      rationale: Shorter context check around one-day memory.

    - id: rf_p0_f23_d1n120_l128_a0p50_r0p90_in0p50_seed20260601
      stage: context_neighbor
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 128
      depth: 1
      units: [120]
      alpha: 0.50
      rho: 0.90
      input_scale: 0.50
      tau0: 1.0e-3
      seed: 20260601
      rationale: Slightly longer context check without moving to weekly windows.

    - id: rf_p0_f23_d1n120_l096_a0p70_r0p90_in0p50_seed20260601
      stage: alpha_neighbor
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 96
      depth: 1
      units: [120]
      alpha: 0.70
      rho: 0.90
      input_scale: 0.50
      tau0: 1.0e-3
      seed: 20260601
      rationale: Higher-leakage neighbor from the corrected screen.

    - id: rf_p0_f23_d1n120_l096_a0p50_r0p90_in0p25_seed20260601
      stage: input_scale_neighbor
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 96
      depth: 1
      units: [120]
      alpha: 0.50
      rho: 0.90
      input_scale: 0.25
      tau0: 1.0e-3
      seed: 20260601
      rationale: Lower-input-scale check for reduced saturation.

    - id: rf_p0_f23_d2n040x040_l096_a0p70_r0p90_in0p50_seed20260601
      stage: compact_d2_neighbor
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 96
      depth: 2
      units: [40, 40]
      alpha: 0.70
      rho: 0.90
      input_scale: 0.50
      tau0: 1.0e-3
      seed: 20260601
      rationale: Compact D2 candidate from the corrected reservoir screen.

    - id: rf_p0_f23_d2n080x080_l096_a0p50_r0p90_in0p50_seed20260601
      stage: compact_d2_neighbor
      priority: 0
      feature_map: window_reservoir_v1
      lag_window: 96
      depth: 2
      units: [80, 80]
      alpha: 0.50
      rho: 0.90
      input_scale: 0.50
      tau0: 1.0e-3
      seed: 20260601
      rationale: D2 version of the fold-1 selected dynamics.

  experiment_blocks:
    - id_prefix: rf_p1_d1n120_l096
      stage: optional_d1n120_dynamics
      priority: 1
      rationale: Optional second-stage dynamics expansion around n=120.
      base:
        feature_map: window_reservoir_v1
        lag_window: 96
        depth: 1
        units: [120]
        tau0: 1.0e-3
        seed: 20260601
      factors:
        alpha: [0.30, 0.50, 0.70, 0.90]
        rho: [0.80, 0.90, 0.97]
        input_scale: [0.25, 0.50, 0.75]

    - id_prefix: rf_p1_d1_context
      stage: optional_context_capacity
      priority: 1
      rationale: Optional context/capacity expansion after priority-0 inspection.
      base:
        feature_map: window_reservoir_v1
        depth: 1
        alpha: 0.50
        rho: 0.90
        input_scale: 0.50
        tau0: 1.0e-3
        seed: 20260601
      factors:
        lag_window: [72, 96, 128]
        units: [[80], [120], [180], [240]]
