pricefm:
  repo_id: RunyaoYu/PriceFM
  filename: FINAL.csv
  raw_dir: application/data_local/pricefm/raw
  interim_dir: application/data_local/pricefm/interim
  processed_dir: application/data_local/pricefm/processed
  external_repo_dir: application/data_local/pricefm/external/PriceFM
  log_dir: application/logs/pricefm

  time_col: time_utc
  timezone: UTC
  frequency: 15min
  observed_start_utc: "2021-12-31 23:00:00+00:00"
  observed_end_utc: "2025-12-31 23:00:00+00:00"
  expected_rows: 140257
  expected_columns: 191
  split_time_col: market_time
  market_time_definition: "time_utc + 1 hour"
  market_calendar_start: "2022-01-01"
  market_calendar_end: "2026-01-01"

  source:
    hf_sha256_expected: 98f596deba7ffaf0edd21e78e1a779256ab24dda5463d445f081e1ee4ab3a54a
    hf_xet_hash_expected: 0dcff4f37d872aea956ba65ddec94cdf7dc263e3e8a855c0510543ae8de2baad
    license: cc-by-4.0
    github_repo: https://github.com/runyao-yu/PriceFM.git

  regions:
    - AT
    - BE
    - BG
    - CZ
    - DE_LU
    - DK_1
    - DK_2
    - EE
    - ES
    - FI
    - FR
    - GR
    - HR
    - HU
    - IT_CALA
    - IT_CNOR
    - IT_CSUD
    - IT_NORD
    - IT_SARD
    - IT_SICI
    - IT_SUD
    - LT
    - LV
    - NL
    - NO_1
    - NO_2
    - NO_3
    - NO_4
    - NO_5
    - PL
    - PT
    - RO
    - SE_1
    - SE_2
    - SE_3
    - SE_4
    - SI
    - SK

  features:
    label: price
    raw: [generation, load, price, solar, wind]
    lag: [price, load, solar, wind]
    lead: [load, solar, wind]
    preserve_unused_raw_features: true

  splits:
    - fold: 1
      train: ["2022-01-01", "2024-09-01"]
      val: ["2024-09-01", "2025-01-01"]
      test: ["2025-01-01", "2025-05-01"]
    - fold: 2
      train: ["2022-01-01", "2025-01-01"]
      val: ["2025-01-01", "2025-05-01"]
      test: ["2025-05-01", "2025-09-01"]
    - fold: 3
      train: ["2022-01-01", "2025-05-01"]
      val: ["2025-05-01", "2025-09-01"]
      test: ["2025-09-01", "2026-01-01"]

  scaling:
    mode: per_region_separate_xy
    scaler: RobustScaler
    fit_on: train_only

  windows:
    lag_window: 8640
    lead_window: 96
    anchor_hour: 0
    anchor_minute: 0
    boundary_mode_default: operational_half_open
    train_boundary_mode: contained_half_open
    validation_boundary_mode: operational_half_open
    test_boundary_mode: operational_half_open
    dtype: float32

  pilot:
    enabled: true
    region: DE_LU
    fold: 1

  eda:
    region_feature_overview:
      enabled: true
      output_dir: application/data_local/pricefm/figures/region_feature_overview
      time_index: market_time
      start: "2022-01-01"
      end: "2026-01-01"
      aggregation: daily
      summary_line: median
      ribbon: [0.10, 0.90]
      figure_format: png
      dpi: 180
      width: 14
      height: 11
