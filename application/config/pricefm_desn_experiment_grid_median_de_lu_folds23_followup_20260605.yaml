pricefm_desn_experiment_grid:
  grid_id: pricefm_median_de_lu_folds23_followup_20260605
  purpose: 'Median follow-up grid for DE_LU folds 2/3: exact seed retests of prior
    P2 winners plus a fold-3 local L=96 n=80 refinement surface.'
  base:
    data_config: application/config/pricefm_data_pipeline.yaml
    full_config: application/config/pricefm_desn_model_median_de_lu_fold1_authoritative_reservoir_corrected_20260602.yaml
    generated_root: application/data_local/pricefm/experiment_grids/pricefm_median_de_lu_folds23_followup_20260605
    run_root: application/data_local/pricefm/runs/pricefm_median_de_lu_folds23_followup_20260605
  scope:
    regions:
    - DE_LU
    folds:
    - 2
    - 3
    quantiles:
    - 0.5
    horizons: all
    ranking_split: val
    audit_split: test
    ranking_unit: original
    ranking_metric: AQL
  fixed:
    lead_window: 96
    feature_map: window_reservoir_v1
    include_intercept: true
    shrink_intercept: false
    train_origin_limit: 3000
    train_origin_selection: tail
    row_chunk_size: 512
    projection_scale: 1.0
    recurrent_sparsity: 0.05
    reservoir_activation: tanh
    state_output: final_layer
    default_jobs: 1
    qdesn_likelihoods:
    - al
    - exal
    warm_start_enabled: true
    exact_equivalence_train_rows: 1000
    artifact_hygiene:
      enabled: true
      clean_adapter_patterns:
      - X_*.csv
      clean_model_patterns:
      - '*.rds'
      - '*.rda'
      - '*.RData'
      preserve_patterns:
      - adapter_manifest.json
      - feature_manifest.json
      - rows_*.csv
      - rows_all.csv
      - y_*.csv
      - metric_summary.csv
      - metric_by_horizon.csv
      - metric_by_horizon_group.csv
      - model_method_summary.csv
      - model_parameter_summary.csv
      - model_trace_summary.csv
      - predictions_with_naive_scaled.csv
      - model_predictions_scaled.csv
      - exact_equivalence.csv
      - warm_start_diagnostics.csv
      - report.md
      - '*.png'
      - '*.pdf'
      - '*.json'
      - '*.log'
  launch:
    followup_seed_refine:
      priorities:
      - 0
      experiment_jobs: 10
      cell_jobs: 1
      build_windows: true
      note: Launch only after dry-run validation. Selection uses validation metrics;
        test metrics remain audit-only.
  experiments:
  - id: fup_f2_priorp2retest_l96_d1_n120_a0p5_r0p9_in0p25_seed20260601
    stage: followup_seed_refine
    priority: 0
    regions:
    - DE_LU
    folds:
    - 2
    feature_map: window_reservoir_v1
    lag_window: 96
    depth: 1
    units:
    - 120
    alpha: 0.5
    rho: 0.9
    input_scale: 0.25
    projection_scale: 1.0
    tau0: 0.001
    seed: 20260601
    quantile: 0.5
    state_output: final_layer
    rationale: Fold 2 follow-up seed/refinement geometry from role prior_p2_retest;
      source experiment rfdeep_p1_input_lag_window96_units120_rho0p9_input_scale0p25;
      source method qdesn_exal_rhs_ns_exact_chunked.
