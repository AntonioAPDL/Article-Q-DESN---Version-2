pricefm_desn_experiment_grid:
  grid_id: pricefm_median_de_lu_folds23_seed_robustness_20260604
  purpose: Median seed-robustness grid for retained fold winners and validation-selected
    horizon-block specialists. This config is prepared for dry-run validation before
    launch.
  base:
    data_config: application/config/pricefm_data_pipeline.yaml
    full_config: application/config/pricefm_desn_model_median_de_lu_fold1_authoritative_reservoir_corrected_20260602.yaml
    generated_root: application/data_local/pricefm/experiment_grids/pricefm_median_de_lu_folds23_seed_robustness_20260604
    run_root: application/data_local/pricefm/runs/pricefm_median_de_lu_folds23_seed_robustness_20260604
  scope:
    regions:
    - DE_LU
    folds:
    - 2
    - 3
    quantiles:
    - 0.5
    horizons: all
    ranking_split: val
    audit_split: test
    ranking_unit: original
    ranking_metric: AQL
  fixed:
    lead_window: 96
    feature_map: window_reservoir_v1
    include_intercept: true
    shrink_intercept: false
    train_origin_limit: 3000
    train_origin_selection: tail
    row_chunk_size: 512
    projection_scale: 1.0
    recurrent_sparsity: 0.05
    reservoir_activation: tanh
    state_output: final_layer
    default_jobs: 1
    qdesn_likelihoods:
    - al
    - exal
    warm_start_enabled: true
    exact_equivalence_train_rows: 1000
    artifact_hygiene:
      enabled: true
      clean_adapter_patterns:
      - X_*.csv
      clean_model_patterns:
      - '*.rds'
      - '*.rda'
      - '*.RData'
      preserve_patterns:
      - adapter_manifest.json
      - feature_manifest.json
      - rows_*.csv
      - rows_all.csv
      - y_*.csv
      - metric_summary.csv
      - metric_by_horizon.csv
      - metric_by_horizon_group.csv
      - model_method_summary.csv
      - model_parameter_summary.csv
      - model_trace_summary.csv
      - predictions_with_naive_scaled.csv
      - model_predictions_scaled.csv
      - exact_equivalence.csv
      - warm_start_diagnostics.csv
      - report.md
      - '*.png'
      - '*.pdf'
      - '*.json'
      - '*.log'
  launch:
    seed_robustness:
      priorities:
      - 0
      experiment_jobs: 10
      cell_jobs: 1
      build_windows: true
      note: Prepared only. Launch after inspecting generated configs and confirming
        storage/CPU budget.
