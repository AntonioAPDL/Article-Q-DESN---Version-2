version: 0.1
application_name: glofas_dec25_source_figures
description: >
  Reproducible local configuration for cutoff-centered source diagnostics at
  the 2022-12-25 GloFAS origin. This configuration is for input validation and
  figure production only; it is not a model-fitting or performance run.

paths:
  input_bundle: application/config/input_bundle_legacy_dec25.yaml
  input_bundle_manifest_template: application/manifests/input_bundle_manifest_TEMPLATE.csv
  input_bundle_manifest: application/manifests/input_bundle_manifest.csv
  input_manifest: application/manifests/input_manifest.csv
  input_manifest_template: application/manifests/input_manifest_TEMPLATE.csv
  schema: application/manifests/expected_schema.yaml
  cutoffs: application/config/cutoffs_dec25.csv
  quantile_grid: application/config/quantile_grid.csv
  model_grid: application/config/model_grid_source_figures.csv
  figure_specs: application/config/figure_specs_dec25_source.yaml
  data_local: application/data_local
  cache: application/cache/legacy_dec25_2022
  runs: application/runs
  logs: application/logs
  generated_outputs: application/outputs/generated
  promoted_tables: tables
  promoted_figures: figures

dependencies:
  qdesn_engine: exdqlm
  qdesn_engine_repo_hint: /data/jaguir26/local/src/exdqlm__wt__shared_fitforecast_v2_1p0p0
  qdesn_engine_expected_repo_hint: /data/jaguir26/local/src/exdqlm__wt__shared_fitforecast_v2_1p0p0
  qdesn_engine_required_load_mode: local_source
  qdesn_engine_required_branch: validation/shared-fitforecast-v2-1.0.0
  qdesn_engine_required_commit: d075941313186b15853e94c2a2cad7d0fec410d8
  qdesn_engine_min_version: 1.0.0
  qdesn_engine_disallowed_paths:
    - /data/jaguir26/local/src/exdqlm__wt__qdesn_fitforecast_0p5p0
    - /data/jaguir26/local/src/exdqlm__wt__validation_fitforecast_0p5p0
    - /data/jaguir26/local/src/exdqlm__wt__glofas_discrepancy_qdesn
    - /data/jaguir26/local/src/exdqlm__wt__qdesn_0p4p0_integration
    - /data/jaguir26/local/src/exdqlm__wt__validation_rerun_after_0p4p0_integration
    - /home/jaguir26/local
  qdesn_engine_required_for:
    - qdesn_reference_only
    - qdesn_glofas_discrepancy
  fail_if_qdesn_engine_missing: false

data:
  forecast_system: GloFAS
  reference_process: transformed gauge streamflow
  transform:
    response: identity
    forecast: identity
    inverse_response: identity
  calendar:
    horizon_unit: days
    require_target_date_equals_origin_plus_horizon: true
  ensemble:
    member_factorization: conditionally_independent_given_forecast_system_quantile
    exchangeable_members: true

forecast_protocol:
  default_horizon_min: 1
  default_horizon_max: 30
  require_common_origins_across_models: true
  require_common_targets_across_models: true
  require_no_target_leakage: true

reservoir:
  D: 2
  "n":
    - 100
    - 100
  n_tilde:
    - 50
  m: 14
  washout: 30
  alpha:
    - 0.30
    - 0.30
  rho:
    - 0.90
    - 0.90
  pi_w:
    - 0.10
    - 0.10
  pi_in:
    - 1.00
    - 1.00
  act_f: tanh
  act_k: identity
  standardize_inputs: true
  add_bias: true
  seed: 20260511

inference:
  default_method: none
  diagnostic_method: none
  likelihood_family: none
  diagnostic_likelihood_family: none
  coefficient_prior_default: rhs
  coefficient_prior_dense_baseline: ridge

scoring:
  primary: []
  intervals: []
  event_thresholds: []

execution:
  require_input_manifest: true
  write_session_info: true
  write_git_state: true
  stop_on_failed_required_model: false
  smoke:
    enabled: false
