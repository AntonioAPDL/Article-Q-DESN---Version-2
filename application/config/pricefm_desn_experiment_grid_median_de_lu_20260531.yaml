pricefm_desn_experiment_grid:
  grid_id: pricefm_median_de_lu_spec_screen_20260531
  purpose: >
    Non-launching screening grid for finding a stronger PriceFM DESN/RHS_NS
    baseline after the L8640, m=30 runs underperformed naive baselines.

  base:
    data_config: application/config/pricefm_data_pipeline.yaml
    full_config: application/config/pricefm_desn_model_full_median_warmstart.yaml
    generated_root: application/data_local/pricefm/experiment_grids/pricefm_median_de_lu_spec_screen_20260531
    run_root: application/data_local/pricefm/runs/pricefm_median_de_lu_spec_screen_20260531

  scope:
    regions: [DE_LU]
    folds: [1]
    quantiles: [0.50]
    horizons: all
    ranking_split: val
    audit_split: test
    ranking_unit: original
    ranking_metric: AQL

  fixed:
    lead_window: 96
    feature_map: window_desn_v1
    include_intercept: true
    shrink_intercept: false
    train_origin_limit: 3000
    train_origin_selection: tail
    row_chunk_size: 512
    projection_scale: 1.0
    default_jobs: 1
    qdesn_likelihoods: [al, exal]
    warm_start_enabled: true
    exact_equivalence_train_rows: 1000

  launch:
    recommended_first_pass:
      priorities: [1]
      experiment_jobs: 3
      cell_jobs: 1
      build_windows: false
      note: >
        Priority 1 uses mostly L96 plus L192 diagnostics. L96 windows already
        exist in the default pipeline; L192 windows must be built if selected.
    recommended_weekly_pass:
      priorities: [2]
      experiment_jobs: 2
      cell_jobs: 1
      build_windows: true
    recommended_long_context_pass:
      priorities: [3, 4]
      experiment_jobs: 1
      cell_jobs: 1
      build_windows: true

  interpretation:
    train_origin_limit_note: >
      With one midnight origin per day, fold 1 cannot literally provide 3000
      origins. The adapter records requested/available/selected origins; for
      L8640 fold 1 this currently resolves to 884 selected origins.
    no_launch_note: >
      This grid is a preparation artifact only. Use the preparation script to
      generate configs, then launch selected experiments explicitly.

  experiments:
    - id: l096_m030_tau1em4_seed20260530_ref
      stage: reference_existing
      lag_window: 96
      feature_dim: 30
      tau0: 1.0e-4
      seed: 20260530
      priority: 0
      rationale: Current closest model run; keep as the comparison anchor.

    - id: l096_m060_tau1em4_seed20260531
      stage: primary_screen
      lag_window: 96
      feature_dim: 60
      tau0: 1.0e-4
      seed: 20260531
      priority: 1
      rationale: Test whether modestly wider recent-window projection helps.

    - id: l096_m060_tau3em4_seed20260531
      stage: primary_screen
      lag_window: 96
      feature_dim: 60
      tau0: 3.0e-4
      seed: 20260531
      priority: 1
      rationale: Same recent window/features with an intermediate RHS scale.

    - id: l096_m060_tau1em3_seed20260531
      stage: primary_screen
      lag_window: 96
      feature_dim: 60
      tau0: 1.0e-3
      seed: 20260531
      priority: 1
      rationale: Same window/features with weaker RHS shrinkage.

    - id: l096_m120_tau3em4_seed20260531
      stage: primary_screen
      lag_window: 96
      feature_dim: 120
      tau0: 3.0e-4
      seed: 20260531
      priority: 1
      rationale: Larger recent-window projection with moderate shrinkage.

    - id: l096_m120_tau1em3_seed20260531
      stage: primary_screen
      lag_window: 96
      feature_dim: 120
      tau0: 1.0e-3
      seed: 20260531
      priority: 1
      rationale: Larger recent-window projection with intermediate shrinkage.

    - id: l096_m120_tau3em3_seed20260531
      stage: primary_screen
      lag_window: 96
      feature_dim: 120
      tau0: 3.0e-3
      seed: 20260531
      priority: 1
      rationale: Larger recent-window projection with moderately weak shrinkage.

    - id: l096_m120_tau1em2_seed20260531
      stage: primary_screen
      lag_window: 96
      feature_dim: 120
      tau0: 1.0e-2
      seed: 20260531
      priority: 1
      rationale: Larger recent-window projection with weaker shrinkage.

    - id: l096_m240_tau1em3_seed20260531
      stage: primary_screen
      lag_window: 96
      feature_dim: 240
      tau0: 1.0e-3
      seed: 20260531
