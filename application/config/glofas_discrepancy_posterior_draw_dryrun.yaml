version: 0.1
application_name: glofas_qdesn_discrepancy_posterior_draw_dryrun
description: >
  Posterior-draw dry-run configuration for the GloFAS discrepancy-calibration
  application. This configuration uses a deliberately small DESN and a short
  AL-MCMC chain to verify the draw-level prediction contract before any tuned
  manuscript-scale data run.

application_model:
  contract: origin_state_bridge

paths:
  input_bundle: application/config/input_bundle_authoritative_dec25.yaml
  input_bundle_manifest_template: application/manifests/input_bundle_manifest_TEMPLATE.csv
  input_bundle_manifest: application/manifests/input_bundle_manifest.csv
  input_manifest: application/manifests/input_manifest.csv
  input_manifest_template: application/manifests/input_manifest_TEMPLATE.csv
  schema: application/manifests/expected_schema.yaml
  cutoffs: application/config/cutoffs_dec25_authoritative.csv
  quantile_grid: application/config/quantile_grid.csv
  model_grid: application/config/model_grid_posterior_draw_dryrun.csv
  figure_specs: application/config/figure_specs_dec25_authoritative.yaml
  data_local: application/data_local
  cache: application/cache/posterior_draw_dec25_authoritative
  runs: application/runs
  logs: application/logs
  generated_outputs: application/outputs/generated
  promoted_tables: tables
  promoted_figures: figures

dependencies:
  qdesn_engine: exdqlm
  qdesn_engine_load_mode: local_source
  qdesn_engine_repo_hint: /data/jaguir26/local/src/exdqlm__wt__shared_fitforecast_v2_1p0p0
  qdesn_engine_expected_repo_hint: /data/jaguir26/local/src/exdqlm__wt__shared_fitforecast_v2_1p0p0
  qdesn_engine_required_load_mode: local_source
  qdesn_engine_required_branch: validation/shared-fitforecast-v2-1.0.0
  qdesn_engine_required_commit: d075941313186b15853e94c2a2cad7d0fec410d8
  qdesn_engine_min_version: 1.0.0
  qdesn_engine_disallowed_paths:
    - /data/jaguir26/local/src/exdqlm__wt__qdesn_fitforecast_0p5p0
    - /data/jaguir26/local/src/exdqlm__wt__validation_fitforecast_0p5p0
    - /data/jaguir26/local/src/exdqlm__wt__glofas_discrepancy_qdesn
    - /data/jaguir26/local/src/exdqlm__wt__qdesn_0p4p0_integration
    - /data/jaguir26/local/src/exdqlm__wt__validation_rerun_after_0p4p0_integration
    - /home/jaguir26/local
  qdesn_engine_required_for:
    - qdesn_glofas_discrepancy
  fail_if_qdesn_engine_missing: true

data:
  forecast_system: GloFAS
  reference_process: transformed gauge streamflow
  transform:
    response: log1p
    forecast: log1p
    inverse_response: expm1
  calendar:
    horizon_unit: days
    require_target_date_equals_origin_plus_horizon: true
  ensemble:
    member_factorization: conditionally_independent_given_forecast_system_quantile
    exchangeable_members: true

forecast_protocol:
  default_horizon_min: 1
  default_horizon_max: 15
  require_common_origins_across_models: true
  require_common_targets_across_models: true
  require_no_target_leakage: true

prediction:
  contract_version: "0.3"
  target: reference_quantile_from_glofas_discrepancy
  horizon_scope: issued_glofas_only
  q_g_source: ensemble_bayesian_bootstrap_quantile
  discrepancy_feature_strategy: horizon_indexed_origin_state
  prediction_unit: posterior_draw
  posterior_draw_contract: q_y_draw_equals_q_g_draw_minus_d_g_draw
  posterior_predictive_sampling: disabled
  beyond_issued_horizon: disabled

reservoir:
  D: 2
  "n":
    - 8
    - 8
  n_tilde:
    - 4
  m: 3
  washout: 3
  alpha:
    - 0.30
    - 0.30
  rho:
    - 0.90
    - 0.90
  pi_w:
    - 0.10
    - 0.10
  pi_in:
    - 1.00
    - 1.00
  act_f: tanh
  act_k: identity
  standardize_inputs: true
  add_bias: true
  seed: 20260511

inference:
  default_method: mcmc
  likelihood_family: al
  diagnostic_likelihood_family: al
  coefficient_prior_default: rhs
  coefficient_prior_dense_baseline: ridge
  mcmc:
    n_iter: 80
    burn_in: 40
    thin: 1
    rhs_tau0: 1.0
    rhs_slab_s2: 4.0
    rhs_a_zeta: 2.0
    rhs_b_zeta: 4.0
    rhs_n_inner: 1
    intercept_prec: 1.0e-9
    sigma_a: 2.0
    sigma_b: 1.0

scoring:
  primary:
    - check_loss
  intervals: []
  event_thresholds: []

post_analysis:
  enabled: true
  run_after_outputs: true
  trace_skip: 5
  credible_level: 0.95
  recent_history_n: 200
  history_chunk_size: 500
  forecast_window:
    before_days: 30
    after_days: 30
  coefficient_forest:
    top_k: 50
  storage:
    write_history_draws_rds: false
    write_history_draws_csv: false

execution:
  require_input_manifest: true
  write_session_info: true
  write_git_state: true
  stop_on_failed_required_model: true
  prelaunch:
    enabled: true
    purpose: posterior_draw_contract_gate
  final_launch:
    enabled: false
    note: this configuration must not be used for manuscript performance claims
