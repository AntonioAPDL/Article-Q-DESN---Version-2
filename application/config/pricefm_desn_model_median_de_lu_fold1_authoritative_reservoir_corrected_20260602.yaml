pricefm_desn_full:
  data_config: application/config/pricefm_data_pipeline.yaml
  package_path: /data/jaguir26/local/src/exdqlm__wt__shared_fitforecast_v2_1p0p0
  rscript_bin: /data/jaguir26/local/opt/R/4.6.0/bin/Rscript
  python_bin: application/data_local/pricefm/venv/bin/python

  scope:
    regions: [DE_LU]
    folds: [1]
    splits: [train, val, test]
    horizons: all
    quantiles: [0.50]
    feature_policy: target_only

  adapter:
    output_root: application/data_local/pricefm/runs/pricefm_median_de_lu_fold1_authoritative_reservoir_corrected_20260602/cells
    feature_map: window_reservoir_v1
    feature_dim: 120
    seed: 20260601
    include_intercept: true
    keep_matrices_after_success: false
    row_chunk_size: 512
    projection_scale: 1.0
    depth: 1
    units: [120]
    alpha: 0.5
    rho: 0.9
    input_scale: 0.5
    recurrent_sparsity: 0.05
    reservoir_activation: tanh
    state_output: final_layer

  run:
    output_dir: application/data_local/pricefm/runs/pricefm_median_de_lu_fold1_authoritative_reservoir_corrected_20260602
    nd_predictive: 400
    seed: 20260601
    default_jobs: 1

  rhs_ns:
    tau0: 1.0e-3
    shrink_intercept: false
    freeze_tau_iters: 5
    freeze_tau_warmup_iters: 5

  warm_start:
    enabled: true
    record_diagnostics: true
    fallback_to_cold: false
    qdesn:
      al:
        enabled: true
        first_tau_source: normal_rhs_ns
        next_tau_source: previous_al_tau
        tau_order: [0.50]
        components: [beta, beta_state, sigma]
      exal:
        enabled: true
        source: al_same_tau
        components: [beta, beta_state, sigma]
        gamma_policy: zero

  normal:
    omega_prior:
      a: 2.0
      b: 1.0
    vb_control:
      max_iter: 100
      min_iter: 50
      tol: 1.0e-5
      verbose: false

  qdesn_vb:
    likelihoods: [al, exal]
    max_iter: 100
    min_iter_elbo: 50
    tol: 1.0e-4
    tol_par: 1.0e-4
    n_samp_xi: 80
    prior_sigma:
      a: 1.0
      b: 1.0
    prior_gamma:
      mu0: 0.0
      s20: 10.0
    chunking:
      enabled: true
      mode: exact
      chunk_size: 2048
      order: sequential
      trace: false

  exact_equivalence:
    enabled: true
    likelihood: al
    quantile: 0.50
    train_rows: 1000
    tolerance: 1.0e-6

  training:
    train_origin_limit: 3000
    train_origin_selection: tail

  artifact_hygiene:
    enabled: true
    clean_adapter_patterns:
      - X_*.csv
    clean_model_patterns:
      - "*.rds"
      - "*.rda"
      - "*.RData"
    preserve_patterns:
      - adapter_manifest.json
      - feature_manifest.json
      - rows_*.csv
      - rows_all.csv
      - y_*.csv
      - metric_summary.csv
      - metric_by_horizon.csv
      - metric_by_horizon_group.csv
      - model_method_summary.csv
      - model_parameter_summary.csv
      - model_trace_summary.csv
      - predictions_with_naive_scaled.csv
      - model_predictions_scaled.csv
      - exact_equivalence.csv
      - warm_start_diagnostics.csv
      - report.md
      - "*.png"
      - "*.pdf"
      - "*.json"
      - "*.log"
