version: 0.1
bundle_id: authoritative_glofas_dec25_2022
description: >
  Article-side registration contract for the audited 2022-12-25 GloFAS
  cutoff bundle copied from the revised jerez workflow. The materialized files
  are untracked local inputs derived from the authoritative frozen shared-input
  snapshot, with the GloFAS retrospective and issued ensemble taken from the
  long-history histfix stable-input bundle.

bundle_root: application/data_local/frozen_inputs/authoritative_cutoffs/cutoff_date=2022-12-25
copy_files: false
manifest_output: application/manifests/input_manifest.csv
bundle_manifest_output: application/manifests/input_bundle_manifest.csv

inputs:
  reference_gauge:
    source_name: reference gauge streamflow
    source_type: observation
    relative_path: reference/reference_gauge.csv
    upstream_reference: jerez frozen shared input cutoff_date=2022-12-25 inputs/usgs_daily.csv
    date_columns:
      - date
    required: true
    notes: >
      USGS daily streamflow at site 11160500, converted to the application
      schema with streamflow in cubic meters per second.

  glofas_retrospective:
    source_name: GloFAS retrospective streamflow
    source_type: retrospective_forecast
    relative_path: glofas/glofas_retrospective.csv
    upstream_reference: jerez histfix stable input cutoff_date=2022-12-25 run_id=20260407_long_history_r01 inputs/retros_daily.csv
    date_columns:
      - date
    required: true
    notes: >
      GloFAS historical v3.1 LISFLOOD consolidated retrospective series at the
      target site. The upstream histfix file is stored on the log1p support
      scale and is converted back to cubic meters per second during
      materialization, so the application panel applies the configured response
      transform exactly once.

  glofas_ensemble:
    source_name: GloFAS ensemble streamflow forecasts
    source_type: ensemble_forecast
    relative_path: glofas/glofas_ensemble.csv
    upstream_reference: jerez histfix stable input cutoff_date=2022-12-25 run_id=20260407_long_history_r01 inputs/glofas_members.csv
    date_columns:
      - origin_date
      - target_date
    required: true
    notes: >
      GloFAS ensemble forecast issued on 2022-12-25, reshaped from the
      authoritative wide member matrix to long format.

  climate_covariates:
    source_name: diagnostic climate covariates
    source_type: covariate
    relative_path: covariates/climate_covariates.csv
    upstream_reference: jerez frozen shared input cutoff_date=2022-12-25 covariates/cov_03_PPT.csv, cov_04_SOIL.csv, cov_05_PCA.csv
    date_columns:
      - date
    required: false
    notes: >
      Wider realized covariates copied for source diagnostics and provenance
      checks. This file is not a model-facing readout input for the active
      application contract.

  ppt_soil_covariates:
    source_name: precipitation and soil covariates
    source_type: covariate
    relative_path: covariates/ppt_soil_covariates.csv
    upstream_reference: jerez frozen shared input cutoff_date=2022-12-25 covariates/cov_03_PPT.csv, cov_04_SOIL.csv
    date_columns:
      - date
    required: false
    notes: >
      Model-facing realized precipitation and soil-moisture covariates. This
      table intentionally excludes GDPC, PCA, and climate-index columns.
