version: 0.1
purpose: >
  Schema contract for the GloFAS Q-DESN application. Local data files may be
  stored in CSV, RDS, or parquet format, but the columns below define the
  required semantic fields after ingestion.

inputs:
  reference_gauge:
    required: true
    required_columns:
      - date
      - station_id
      - streamflow
    required_properties:
      - one row per station_id and date
      - no duplicate dates within station_id
      - measurement units recorded in metadata

  glofas_retrospective:
    required: true
    required_columns:
      - date
      - location_id
      - glofas_streamflow
    required_properties:
      - one retrospective value per location_id and date after preprocessing
      - date range overlaps the reference gauge training period
      - transformation metadata recorded before modeling

  glofas_ensemble:
    required: true
    required_columns:
      - origin_date
      - target_date
      - horizon
      - member
      - glofas_streamflow
    required_properties:
      - unique rows by origin_date, target_date, horizon, and member
      - horizon equals target_date minus origin_date under the chosen calendar
      - all members for a given origin and horizon are retained or explicitly flagged

  climate_covariates:
    required: false
    required_columns:
      - date
    optional_columns:
      - gdpc1
      - climate_index_name
      - lag
    required_properties:
      - retained for diagnostics or provenance unless a separate model contract enables it
      - not used by the active GloFAS Q-DESN readout contract

  ppt_soil_covariates:
    required: false
    required_columns:
      - date
      - ppt
      - soil
    required_properties:
      - contains only precipitation and soil-moisture covariates for model use
      - no GDPC, PCA, or climate-index columns are used by the Q-DESN readout
      - forecast-window values must be tagged as realized, forecast, or blended

derived_panel:
  required_columns:
    - origin_date
    - target_date
    - horizon
    - member
    - is_retrospective
    - is_ensemble
    - y_reference
    - g_glofas
    - y_transformed
    - g_transformed
    - split
    - cutoff_id
  required_properties:
    - no target observation is used before its forecast origin
    - train, validation, and test rows are mutually exclusive by target_date
    - every promoted forecast score traces to a row in this panel

model_grid:
  required_columns:
    - fit_id
    - model_id
    - model_family
    - quantile_level
    - inference_method
    - coefficient_prior
    - reservoir_seed
    - config_hash
  required_properties:
    - fit_id values are unique
    - model_id values group separately fitted quantile levels for synthesis
    - quantile_level is numeric and belongs to the configured quantile grid
  allowed_model_families:
    - raw_glofas
    - qdesn_reference_only
    - qdesn_glofas_discrepancy
    - dqlm_baseline
    - exdqlm_baseline

scoring_outputs:
  required_tables:
    - fit_status.csv
    - prediction_quantiles.csv
    - score_by_origin.csv
    - score_by_horizon.csv
    - score_summary.csv
    - manuscript_output_provenance.csv
  prediction_required_columns:
    - qhat
    - q_g_hat
    - d_g_hat
    - prediction_contract
    - contract_version
    - forecast_scope
    - q_g_source
    - discrepancy_feature_strategy
    - prediction_unit
    - posterior_draw_contract
    - posterior_predictive_sampling
    - beyond_issued_horizon
  posterior_draw_required_columns:
    - draw_id
    - q_y_draw
    - q_g_draw
    - d_g_draw
    - quantile_level
    - origin_date
    - target_date
    - horizon
    - prediction_contract
    - contract_version
    - forecast_scope
    - q_g_source
    - discrepancy_feature_strategy
    - prediction_unit
    - posterior_draw_contract
    - posterior_predictive_sampling
    - beyond_issued_horizon
  required_scores:
    - check_loss
    - interval_coverage
    - interval_score
    - crps_quantile_grid
    - runtime_seconds
